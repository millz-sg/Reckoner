<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Reckoner">
<meta name="theme-color" content="#14161B">
<title>Reckoner</title>
<style>
  :root{
    --bg:#14161B; --panel:#1B1E24; --raised:#242833; --line:#2E333D;
    --ink:#EDEEF0; --muted:#868D99; --faint:#5A606B;
    --amber:#FFB454; --green:#5FD38A; --red:#FF6B63;
    --pad: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex; justify-content:center;
    padding:0 env(safe-area-inset-right,0px) 0 env(safe-area-inset-left,0px);
    overscroll-behavior:none;
  }
  #app{width:100%; max-width:460px; min-height:100dvh; display:flex; flex-direction:column;
       padding:calc(env(safe-area-inset-top,0px) + 22px) 18px calc(20px + var(--pad)); }
  .mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace; font-variant-numeric:tabular-nums;}
  .eyebrow{font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); font-weight:600;}
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; touch-action:manipulation;}
  .hide{display:none !important;}

  /* ---- header / wordmark ---- */
  header{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:6px;}
  .wordmark{font-weight:800; letter-spacing:-.02em; font-size:22px;}
  .wordmark .dot{color:var(--amber);}
  .tag{font-size:11px; color:var(--faint); letter-spacing:.02em;}
  .backbtn{font-size:14px; color:var(--muted); font-weight:600; padding:6px 2px; letter-spacing:.02em;}

  /* ---- home stats strip ---- */
  .stats{display:flex; gap:10px; margin:18px 0 22px;}
  .stat{flex:1; background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:12px 12px 10px;}
  .stat .num{font-size:22px; font-weight:700; letter-spacing:-.02em;}
  .stat .lab{font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-top:3px;}

  /* ---- mode tiles ---- */
  .tiles{display:flex; flex-direction:column; gap:14px;}
  .tile{position:relative; text-align:left; background:var(--panel); border:1px solid var(--line);
        border-radius:20px; padding:20px 18px; overflow:hidden; transition:transform .08s, border-color .15s;}
  .tile:active{transform:scale(.985);}
  .tile .idx{position:absolute; top:16px; right:18px; font-size:12px; color:var(--faint); font-weight:700;}
  .tile h2{margin:0 0 6px; font-size:19px; font-weight:750; letter-spacing:-.01em;}
  .tile p{margin:0; font-size:13px; line-height:1.5; color:var(--muted); max-width:34ch;}
  .tile .glyph{font-size:20px; margin-bottom:12px; display:block;}
  .tile.sprint{border-color:#3a3320;}
  .tile.sprint .glyph{color:var(--amber);}
  .tile.cases .glyph{color:var(--green);}

  .homefoot{margin-top:auto; padding-top:24px; text-align:center;}
  .homefoot p{font-size:11px; color:var(--faint); line-height:1.6; margin:0;}
  .homefoot b{color:var(--muted); font-weight:600;}

  /* ---- config controls ---- */
  .section-lab{margin:20px 0 10px;}
  .chips{display:flex; flex-wrap:wrap; gap:8px;}
  .chip{border:1px solid var(--line); background:var(--panel); border-radius:11px; padding:9px 13px;
        font-size:13px; font-weight:600; color:var(--muted); transition:.12s;}
  .chip.on{background:var(--raised); color:var(--ink); border-color:var(--faint);}
  .seg{display:flex; background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:4px; gap:4px;}
  .seg button{flex:1; padding:9px 4px; border-radius:9px; font-size:13px; font-weight:650; color:var(--muted);}
  .seg button.on{background:var(--raised); color:var(--ink);}

  .primary{width:100%; background:var(--amber); color:#211804; font-weight:750; font-size:16px;
           padding:16px; border-radius:15px; margin-top:26px; letter-spacing:.01em;}
  .primary.green{background:var(--green); color:#08210f;}
  .primary:active{filter:brightness(.94);}
  .ghost{width:100%; background:var(--panel); border:1px solid var(--line); color:var(--ink);
         font-weight:650; font-size:15px; padding:14px; border-radius:14px; margin-top:12px;}

  /* ---- display panel (the signature) ---- */
  .display{background:linear-gradient(180deg,#191c22,#15171d); border:1px solid var(--line);
           border-radius:20px; padding:22px 20px 20px; box-shadow:inset 0 1px 0 #262a33, 0 8px 24px -14px #000;}
  .timerbar{height:4px; border-radius:4px; background:#22262e; overflow:hidden; margin-bottom:20px;}
  .timerbar > i{display:block; height:100%; background:var(--amber); width:100%; transition:width .25s linear;}
  .qmeta{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;}
  .qmeta .k{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); font-weight:600;}
  .qmeta .v{font-size:13px; color:var(--ink); font-weight:700;}
  .qmeta .v.warn{color:var(--amber);}

  .prompt{font-weight:700; letter-spacing:-.01em; line-height:1.15; color:var(--ink);}
  .prompt.big{font-size:clamp(30px,10vw,44px);}
  .prompt.para{font-size:17px; line-height:1.5; font-weight:600;}

  .answerline{margin-top:18px; min-height:44px; display:flex; align-items:center; justify-content:flex-end;
              font-size:32px; font-weight:700; letter-spacing:.01em;}
  .answerline .ph{color:var(--faint);}
  .answerline .cur{color:var(--amber);}
  .answerline.good{color:var(--green);} .answerline.bad{color:var(--red);}
  .zerohint{text-align:right; font-size:11px; color:var(--muted); margin-top:2px; height:14px;}

  /* ---- keypad ---- */
  .keypad{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:16px;}
  .key{background:var(--raised); border:1px solid var(--line); border-radius:14px; padding:18px 0;
       font-size:22px; font-weight:650; transition:transform .05s, background .1s;}
  .key:active{transform:scale(.94); background:#2c313c;}
  .key.util{font-size:17px; color:var(--muted);}
  .key.enter{background:var(--green); color:#08210f; font-size:18px; font-weight:750;}
  .key.enter:active{filter:brightness(.94);}

  /* ---- case controls ---- */
  .caseacts{display:flex; gap:10px; margin-top:16px;}
  .caseacts button{flex:1; padding:14px; border-radius:14px; font-weight:700; font-size:15px;}
  .btn-reveal{background:var(--raised); border:1px solid var(--line); color:var(--ink);}
  .btn-next{background:var(--green); color:#08210f;}
  .btn-check{background:var(--amber); color:#211804;}
  .solution{margin-top:18px; background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:16px 16px 6px;}
  .solution .slab{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); font-weight:600; margin-bottom:10px;}
  .step{display:flex; justify-content:space-between; gap:12px; padding:8px 0; border-bottom:1px solid var(--line); font-size:14px;}
  .step:last-child{border-bottom:none;}
  .step .desc{color:var(--muted);}
  .step .val{font-weight:700; text-align:right; white-space:nowrap;}
  .step.final .desc{color:var(--ink); font-weight:700;}
  .step.final .val{color:var(--green); font-size:16px;}

  /* ---- results ---- */
  .results{text-align:center; margin-top:36px;}
  .results .big{font-size:64px; font-weight:800; letter-spacing:-.03em; line-height:1;}
  .results .sub{color:var(--muted); font-size:14px; margin-top:6px;}
  .rgrid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:28px;}
  .rgrid .cell{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:14px;}
  .rgrid .cell .n{font-size:22px; font-weight:700;}
  .rgrid .cell .l{font-size:10px; letter-spacing:.13em; text-transform:uppercase; color:var(--muted); margin-top:3px;}
  .pill{display:inline-block; margin-top:18px; font-size:12px; font-weight:700; color:var(--amber);
        background:#2a2413; border:1px solid #3a3320; padding:6px 12px; border-radius:20px;}

  @media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
</head>
<body>
<div id="app"></div>

<script>
"use strict";
/* ============================ storage ============================ */
const LS_KEY = "reckoner:v1";
const defaults = {
  lifetimeReps:0, correct:0, attempts:0,
  bestSprint:{60:0,120:0,180:0},
  cfg:{ ops:["mul","sub","pct"], diff:"med", dur:120 }
};
function load(){ try{ return Object.assign({}, defaults, JSON.parse(localStorage.getItem(LS_KEY)||"{}")); }catch(e){ return {...defaults}; } }
function save(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(store)); }catch(e){} }
let store = load();

/* ============================ helpers ============================ */
const app = document.getElementById("app");
const R = (a,b)=> Math.floor(Math.random()*(b-a+1))+a;
const pick = arr => arr[Math.floor(Math.random()*arr.length)];
function grp(str){
  let neg = str.startsWith("-"); let s = neg?str.slice(1):str;
  let [i,d] = s.split(".");
  i = i.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
  return (neg?"-":"") + i + (d!==undefined ? "."+d : "");
}
function words(n){
  if(n>=1e9 && n%1e9===0) return (n/1e9)+" billion";
  if(n>=1e6 && n%1e6===0) return (n/1e6)+" million";
  if(n>=1e3 && n%1e3===0) return (n/1e3)+" thousand";
  return grp(String(n));
}
const money = n => "$"+grp(String(n));

/* ============================ mental math generators ============================ */
const NICE_BASES=[200,400,500,800,1000,2000,4000,5000,8000,10000,40000,50000,80000,100000,
  400000,500000,800000,1000000,2000000,4000000,5000000,8000000,10000000,
  40000000,48000000,50000000,80000000,100000000,120000000,
  400000000,480000000,500000000,800000000,1000000000,2000000000];
// percent -> reduced denominator of (p/100)
const PCTS={0.1:1000,0.5:200,1:100,2:50,2.5:40,5:20,7.5:40,10:10,12.5:8,15:20,20:5,25:4,50:2,75:4,150:2};
// decimal -> denominator (of the fraction form)
const DECS={0.1:10,0.2:5,0.25:4,0.05:20,0.5:2,0.75:4,0.125:8,0.375:8,1.5:2,2.5:2,1.25:4,3.5:2};

const RANGES={
  add:{easy:[[2,99],[2,99]], med:[[10,500],[10,500]], hard:[[100,999],[100,9999]]},
  sub:{easy:[20,99], med:[100,999], hard:[1000,9999]},
  mul:{easy:[[2,9],[2,12]], med:[[3,9],[11,99]], hard:[[11,99],[11,99]]},
  div:{easy:[[2,12],[2,12]], med:[[2,12],[4,50]], hard:[[6,40],[11,99]]},
};
function gAdd(d){ const[[a1,a2],[b1,b2]]=RANGES.add[d]; const a=R(a1,a2),b=R(b1,b2);
  return {q:`${grp(a+"")} + ${grp(b+"")}`, ans:a+b}; }
function gSub(d){ const[lo,hi]=RANGES.sub[d]; const a=R(lo,hi), b=R(Math.floor(lo/4)||1,a-1);
  return {q:`${grp(a+"")} − ${grp(b+"")}`, ans:a-b}; }
function gMul(d){ const[[a1,a2],[b1,b2]]=RANGES.mul[d]; const a=R(a1,a2),b=R(b1,b2);
  return {q:`${a} × ${b}`, ans:a*b}; }
function gDiv(d){ const[[d1,d2],[q1,q2]]=RANGES.div[d]; const dv=R(d1,d2),qt=R(q1,q2);
  return {q:`${grp((dv*qt)+"")} ÷ ${dv}`, ans:qt}; }
function gPct(d){
  const pool = d==="easy"?[1,5,10,25,50]: d==="med"?[2,15,20,75]:[0.1,0.5,2.5,7.5,12.5,150];
  const p = pick(pool); const denom=PCTS[p];
  const bases = NICE_BASES.filter(b=> (b*p)%100===0 && (d==="easy"? b<=1e6 : d==="hard"? b>=1e5 : true));
  const base = pick(bases.length?bases:NICE_BASES.filter(b=>(b*p)%100===0));
  return {q:`${p}% of ${words(base)}`, ans:base*p/100};
}
function gDec(d){
  const pool = d==="easy"?[0.5,0.25,0.1,0.2]: d==="med"?[0.75,1.5,2.5,0.05]:[0.125,0.375,1.25,3.5];
  const dec=pick(pool); const denom=DECS[dec];
  const mult = d==="easy"?R(2,40): d==="med"?R(4,120):R(8,400);
  const base = denom*mult;
  return {q:`${dec} × ${grp(base+"")}`, ans:dec*base};
}
const GEN={add:gAdd, sub:gSub, mul:gMul, div:gDiv, pct:gPct, dec:gDec};
const OP_LABELS={add:"Add", sub:"Subtract", mul:"Multiply", div:"Divide", pct:"Percent", dec:"Decimals"};
function nextMental(ops,diff){ const op=pick(ops); return GEN[op](diff); }

/* ============================ case generators ============================ */
const BUSINESSES=[
  {n:"bus company", unit:"seats per bus", trip:"trips"},
  {n:"ferry operator", unit:"seats per ferry", trip:"crossings"},
  {n:"regional airline", unit:"seats per plane", trip:"flights"},
  {n:"theater", unit:"seats per show", trip:"shows"},
];
function cRevenue(){
  const biz=pick(BUSINESSES);
  const seats=pick([40,50,60,80,120,150]);
  const price=pick([20,45,80,120,200,300]);
  const util=pick([60,70,75,80]);
  const trips=pick([6,8,10,12,20]);
  const full=seats*price, avg=full*util/100, wk=avg*trips, yr=wk*52;
  return {
    prompt:`A ${biz.n} runs buses with ${seats} ${biz.unit}, charging ${money(price)} a seat. On average ${util}% of seats fill, and each bus does ${trips} ${biz.trip} a week. What's the yearly revenue?`,
    ans:yr, tol:0.005,
    steps:[
      {d:`Full bus: ${seats} × ${money(price)}`, v:money(full)},
      {d:`At ${util}% load`, v:money(avg)},
      {d:`× ${trips} ${biz.trip}/week`, v:money(wk)},
      {d:`× 52 weeks`, v:money(yr)},
    ]
  };
}
function cMarket(){
  const pop=pick([40,60,80,120,300,330]);      // millions
  const pen=pick([10,20,25,40,60]);            // %
  const spend=pick([50,120,200,400,600]);      // $/yr
  const users=pop*1e6*pen/100, size=users*spend;
  return {
    prompt:`A country has ${pop} million people. ${pen}% own a smartphone, and each spends about ${money(spend)} a year on apps. Roughly how big is the annual app market?`,
    ans:size, tol:0.01,
    steps:[
      {d:`Users: ${pop}M × ${pen}%`, v:words(users)},
      {d:`× ${money(spend)} / user`, v:money(size)},
    ]
  };
}
function cBreakeven(){
  const price=pick([20,25,40,60,80]);
  const vc=pick([8,10,15,20,30]).valueOf();
  const v = Math.min(vc, price-5);
  const cm=price-v;
  const fixed=cm*pick([2000,5000,10000,25000,40000]);
  const units=fixed/cm;
  return {
    prompt:`A product sells for ${money(price)} with ${money(v)} variable cost per unit. Fixed costs are ${money(fixed)} a year. How many units to break even?`,
    ans:units, tol:0.005,
    steps:[
      {d:`Contribution: ${money(price)} − ${money(v)}`, v:money(cm)},
      {d:`Break-even: ${money(fixed)} ÷ ${money(cm)}`, v:grp(units+"")+" units"},
    ]
  };
}
function cMargin(){
  const price=pick([40,50,60,80,120,200]);
  const v=Math.round(price*pick([0.4,0.5,0.6,0.667,0.75]));
  const cm=price-v; const pct=cm/price*100;
  return {
    prompt:`An item sells for ${money(price)} and costs ${money(v)} to make. What's the contribution margin, as a percent?`,
    ans:Math.round(pct*10)/10, tol:0.03, unit:"%",
    steps:[
      {d:`Margin $: ${money(price)} − ${money(v)}`, v:money(cm)},
      {d:`÷ price ${money(price)}`, v:(Math.round(pct*10)/10)+"%"},
    ]
  };
}
function cChurn(){
  const cust=pick([200000,500000,1000000,2000000,4000000]);
  const churn=pick([2,3,5,8,10]);
  const arpu=pick([15,30,50,120,300]);
  const lost=cust*churn/100, rev=lost*arpu;
  return {
    prompt:`A service has ${grp(cust+"")} customers paying ${money(arpu)} a year. If ${churn}% churn, how much annual revenue is lost?`,
    ans:rev, tol:0.005,
    steps:[
      {d:`Lost customers: ${churn}% of ${words(cust)}`, v:grp(lost+"")},
      {d:`× ${money(arpu)}`, v:money(rev)},
    ]
  };
}
function cGrowth(){
  const start=pick([200,400,500,800])*pick([1e3,1e6]);
  const g=pick([15,20,25,50,-10,-20]);
  const end=start*(1+g/100);
  return {
    prompt:`Revenue went from ${money(start)} to ${money(end)} in a year. What's the growth rate, as a percent?`,
    ans:g, tol:0.03, unit:"%",
    steps:[
      {d:`Change: ${money(end)} − ${money(start)}`, v:money(end-start)},
      {d:`÷ start ${money(start)}`, v:g+"%"},
    ]
  };
}
const CASE_GEN={rev:cRevenue, mkt:cMarket, be:cBreakeven, mgn:cMargin, chn:cChurn, grw:cGrowth};
const CASE_LABELS={rev:"Revenue", mkt:"Market size", be:"Break-even", mgn:"Margin", chn:"Churn", grw:"Growth %"};

/* ============================ router ============================ */
let screen="home";
let sprint=null, caseState=null;
function go(s){ screen=s; render(); }

function render(){
  if(screen==="home") return renderHome();
  if(screen==="sprintCfg") return renderSprintCfg();
  if(screen==="sprintRun") return renderSprintRun();
  if(screen==="sprintDone") return renderSprintDone();
  if(screen==="caseCfg") return renderCaseCfg();
  if(screen==="caseRun") return renderCaseRun();
}

/* ---------------- home ---------------- */
function renderHome(){
  const acc = store.attempts ? Math.round(store.correct/store.attempts*100) : 0;
  app.innerHTML = `
    <header><div class="wordmark">Reckoner<span class="dot">.</span></div>
      <div class="tag">napkin math, drilled</div></header>
    <div class="stats">
      <div class="stat"><div class="num mono">${grp(store.lifetimeReps+"")}</div><div class="lab">Reps</div></div>
      <div class="stat"><div class="num mono">${store.bestSprint[120]||0}</div><div class="lab">Best 2-min</div></div>
      <div class="stat"><div class="num mono">${acc}%</div><div class="lab">Accuracy</div></div>
    </div>
    <div class="tiles">
      <button class="tile sprint" id="t-sprint">
        <span class="glyph">⚡</span><span class="idx">01</span>
        <h2>Sprint</h2>
        <p>Fast-fire drills for the commute — tap through 11×85, 116−75, .1% of a billion. Beat the clock.</p>
      </button>
      <button class="tile cases" id="t-cases">
        <span class="glyph">✎</span><span class="idx">02</span>
        <h2>Cases</h2>
        <p>Full word problems — revenue, market sizing, break-even. Work it on paper, then reveal the build-up.</p>
      </button>
    </div>
    <div class="homefoot"><p>Do the math out loud. Cases reward a fast <b>“roughly”</b> over a slow exact.<br>Add to Home Screen for full-screen reps.</p></div>`;
  document.getElementById("t-sprint").onclick=()=>go("sprintCfg");
  document.getElementById("t-cases").onclick=()=>go("caseCfg");
}

/* ---------------- sprint config ---------------- */
function renderSprintCfg(){
  const c=store.cfg;
  app.innerHTML = `
    <header><button class="backbtn" id="back">‹ Back</button><div class="tag">Sprint setup</div></header>
    <div class="section-lab eyebrow">Operations</div>
    <div class="chips" id="ops">
      ${Object.keys(OP_LABELS).map(op=>`<button class="chip ${c.ops.includes(op)?"on":""}" data-op="${op}">${OP_LABELS[op]}</button>`).join("")}
    </div>
    <div class="section-lab eyebrow">Difficulty</div>
    <div class="seg" id="diff">
      ${["easy","med","hard"].map(d=>`<button data-d="${d}" class="${c.diff===d?"on":""}">${d==="med"?"Medium":d[0].toUpperCase()+d.slice(1)}</button>`).join("")}
    </div>
    <div class="section-lab eyebrow">Session length</div>
    <div class="seg" id="dur">
      ${[60,120,180].map(s=>`<button data-s="${s}" class="${c.dur===s?"on":""}">${s/60} min</button>`).join("")}
    </div>
    <button class="primary" id="start">Start sprint</button>`;
  document.getElementById("back").onclick=()=>go("home");
  document.querySelectorAll("#ops .chip").forEach(b=>b.onclick=()=>{
    const op=b.dataset.op; const i=c.ops.indexOf(op);
    if(i>=0){ if(c.ops.length>1) c.ops.splice(i,1); } else c.ops.push(op);
    save(); b.classList.toggle("on");
  });
  document.querySelectorAll("#diff button").forEach(b=>b.onclick=()=>{
    c.diff=b.dataset.d; save(); document.querySelectorAll("#diff button").forEach(x=>x.classList.toggle("on",x===b));
  });
  document.querySelectorAll("#dur button").forEach(b=>b.onclick=()=>{
    c.dur=+b.dataset.s; save(); document.querySelectorAll("#dur button").forEach(x=>x.classList.toggle("on",x===b));
  });
  document.getElementById("start").onclick=startSprint;
}

/* ---------------- sprint run ---------------- */
function startSprint(){
  const c=store.cfg;
  sprint={ ops:[...c.ops], diff:c.diff, dur:c.dur, left:c.dur,
           correct:0, attempts:0, typed:"", cur:null, started:Date.now(), t:null };
  sprint.cur=nextMental(sprint.ops,sprint.diff);
  go("sprintRun");
  sprint.t=setInterval(tickSprint,250);
}
function tickSprint(){
  sprint.left = sprint.dur - (Date.now()-sprint.started)/1000;
  if(sprint.left<=0){ endSprint(); return; }
  const bar=document.getElementById("tbar"); const clk=document.getElementById("clk");
  if(bar) bar.style.width=(sprint.left/sprint.dur*100)+"%";
  if(clk) clk.textContent=Math.ceil(sprint.left)+"s";
}
function endSprint(){
  clearInterval(sprint.t);
  store.lifetimeReps+=sprint.correct;
  store.correct+=sprint.correct; store.attempts+=sprint.attempts;
  if(sprint.correct>(store.bestSprint[sprint.dur]||0)) store.bestSprint[sprint.dur]=sprint.correct;
  save(); go("sprintDone");
}
function renderSprintRun(){
  const s=sprint;
  app.innerHTML = `
    <header><button class="backbtn" id="quit">‹ End</button>
      <div class="tag">${OP_LABELS[""]||""}Sprint · ${s.diff==="med"?"medium":s.diff}</div></header>
    <div class="display">
      <div class="timerbar"><i id="tbar"></i></div>
      <div class="qmeta"><span class="k">Score <span class="v" id="scr">${s.correct}</span></span>
        <span class="v" id="clk">${Math.ceil(s.left)}s</span></div>
      <div class="prompt big mono" id="q">${s.cur.q}</div>
      <div class="answerline mono" id="ans"><span class="ph">·</span></div>
      <div class="zerohint mono" id="zh"></div>
    </div>
    <div class="keypad" id="pad">
      ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="key" data-k="${n}">${n}</button>`).join("")}
      <button class="key util" data-k="del">⌫</button>
      <button class="key" data-k="0">0</button>
      <button class="key util" data-k="clr">C</button>
    </div>`;
  document.getElementById("quit").onclick=()=>{ clearInterval(s.t); go("home"); };
  document.querySelectorAll("#pad .key").forEach(b=>b.onclick=()=>sprintKey(b.dataset.k));
  tickSprint();
}
function sprintKey(k){
  const s=sprint;
  if(k==="del") s.typed=s.typed.slice(0,-1);
  else if(k==="clr") s.typed="";
  else if(s.typed.length<12) s.typed+=k;
  const ansEl=document.getElementById("ans"), zh=document.getElementById("zh");
  ansEl.classList.remove("good","bad");
  if(s.typed===""){ ansEl.innerHTML=`<span class="ph">·</span>`; zh.textContent=""; }
  else{ ansEl.innerHTML=`<span class="cur">${grp(s.typed)}</span>`;
        zh.textContent = s.typed.length>3 ? grp(s.typed)+" — check your zeros" : ""; }
  // auto-check
  if(s.typed!=="" && Number(s.typed)===s.cur.ans){
    s.correct++; s.attempts++;
    ansEl.classList.add("good");
    document.getElementById("scr").textContent=s.correct;
    setTimeout(()=>{ s.typed=""; s.cur=nextMental(s.ops,s.diff);
      const q=document.getElementById("q"); if(q){ q.textContent=s.cur.q;
      document.getElementById("ans").innerHTML=`<span class="ph">·</span>`;
      document.getElementById("ans").classList.remove("good");
      document.getElementById("zh").textContent=""; } }, 160);
  }
}
function renderSprintDone(){
  const s=sprint; const secs=s.dur;
  const rate=(s.correct/(secs/60)); const acc=s.attempts?Math.round(s.correct/s.attempts*100):0;
  const best=store.bestSprint[secs]||0; const isBest=s.correct>=best && s.correct>0;
  app.innerHTML=`
    <header><button class="backbtn" id="home">‹ Home</button><div class="tag">Sprint complete</div></header>
    <div class="results">
      <div class="big mono">${s.correct}</div>
      <div class="sub">solved in ${secs/60} min</div>
      ${isBest?`<div class="pill">★ New best</div>`:``}
      <div class="rgrid">
        <div class="cell"><div class="n mono">${rate.toFixed(1)}</div><div class="l">per min</div></div>
        <div class="cell"><div class="n mono">${acc}%</div><div class="l">accuracy</div></div>
      </div>
    </div>
    <button class="primary" id="again">Run it again</button>
    <button class="ghost" id="cfg">Change setup</button>`;
  document.getElementById("home").onclick=()=>go("home");
  document.getElementById("again").onclick=startSprint;
  document.getElementById("cfg").onclick=()=>go("sprintCfg");
}

/* ---------------- case config ---------------- */
let caseCfg={ types:["rev","mkt","be","mgn","chn","grw"] };
function renderCaseCfg(){
  app.innerHTML=`
    <header><button class="backbtn" id="back">‹ Back</button><div class="tag">Cases setup</div></header>
    <div class="section-lab eyebrow">Problem types</div>
    <div class="chips" id="types">
      ${Object.keys(CASE_LABELS).map(t=>`<button class="chip ${caseCfg.types.includes(t)?"on":""}" data-t="${t}">${CASE_LABELS[t]}</button>`).join("")}
    </div>
    <div class="homefoot" style="margin-top:22px"><p style="text-align:left">Pen & paper mode: read the prompt, work it out, then <b>Reveal</b> the step-by-step build-up. Or type your answer to check it (accepts a “roughly” tolerance).</p></div>
    <button class="primary green" id="start">Start cases</button>`;
  document.getElementById("back").onclick=()=>go("home");
  document.querySelectorAll("#types .chip").forEach(b=>b.onclick=()=>{
    const t=b.dataset.t; const i=caseCfg.types.indexOf(t);
    if(i>=0){ if(caseCfg.types.length>1) caseCfg.types.splice(i,1);} else caseCfg.types.push(t);
    b.classList.toggle("on");
  });
  document.getElementById("start").onclick=()=>{ newCase(); go("caseRun"); };
}

/* ---------------- case run ---------------- */
function newCase(){
  const t=pick(caseCfg.types); const c=CASE_GEN[t](); c.type=t;
  caseState={ c, typed:"", revealed:false, started:Date.now(), t:null, checked:null };
}
function renderCaseRun(){
  const cs=caseState, c=cs.c;
  app.innerHTML=`
    <header><button class="backbtn" id="home">‹ Home</button><div class="tag">${CASE_LABELS[c.type]}</div></header>
    <div class="display">
      <div class="qmeta"><span class="k">Timer</span><span class="v" id="clk">0:00</span></div>
      <div class="prompt para" id="q">${c.prompt}</div>
      <div class="answerline mono" id="ans"><span class="ph">${c.unit==="%"?"—%":"$—"}</span></div>
      <div class="zerohint mono" id="zh"></div>
    </div>
    <div class="keypad" id="pad">
      ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="key" data-k="${n}">${n}</button>`).join("")}
      <button class="key util" data-k="del">⌫</button>
      <button class="key" data-k="0">0</button>
      <button class="key util" data-k="dot">.</button>
    </div>
    <div class="caseacts">
      <button class="btn-check" id="check">Check</button>
      <button class="btn-reveal" id="reveal">Reveal</button>
      <button class="btn-next" id="next">Next ›</button>
    </div>
    <div id="solwrap"></div>`;
  document.getElementById("home").onclick=()=>{ clearInterval(cs.t); go("home"); };
  document.querySelectorAll("#pad .key").forEach(b=>b.onclick=()=>caseKey(b.dataset.k));
  document.getElementById("check").onclick=checkCase;
  document.getElementById("reveal").onclick=revealCase;
  document.getElementById("next").onclick=()=>{ clearInterval(cs.t); newCase(); go("caseRun"); };
  cs.t=setInterval(()=>{ const el=document.getElementById("clk"); if(!el) return;
    const s=Math.floor((Date.now()-cs.started)/1000);
    el.textContent=Math.floor(s/60)+":"+String(s%60).padStart(2,"0");
    el.classList.toggle("warn", s>90); },500);
}
function caseKey(k){
  const cs=caseState, c=cs.c;
  if(k==="del") cs.typed=cs.typed.slice(0,-1);
  else if(k==="dot"){ if(!cs.typed.includes(".") && c.unit==="%") cs.typed+= (cs.typed===""?"0.":"."); }
  else if(cs.typed.replace(".","").length<13) cs.typed+=k;
  const ansEl=document.getElementById("ans"), zh=document.getElementById("zh");
  ansEl.classList.remove("good","bad");
  if(cs.typed===""){ ansEl.innerHTML=`<span class="ph">${c.unit==="%"?"—%":"$—"}</span>`; zh.textContent=""; }
  else{ const disp=(c.unit==="%"?"":"$")+grp(cs.typed)+(c.unit==="%"?"%":"");
        ansEl.innerHTML=`<span class="cur">${disp}</span>`;
        zh.textContent = (c.unit!=="%" && cs.typed.length>3) ? grp(cs.typed)+" — mind the zeros" : ""; }
}
function checkCase(){
  const cs=caseState, c=cs.c; if(cs.typed==="") return;
  const val=Number(cs.typed); const ok=Math.abs(val-c.ans) <= Math.abs(c.ans)*(c.tol||0.01)+ (c.unit==="%"?0.05:0);
  const ansEl=document.getElementById("ans");
  ansEl.classList.remove("good","bad"); ansEl.classList.add(ok?"good":"bad");
  revealCase(ok);
}
function revealCase(ok){
  const cs=caseState, c=cs.c; cs.revealed=true;
  const exact = c.unit==="%" ? (c.ans+"%") : money(c.ans);
  const wrap=document.getElementById("solwrap");
  const banner = (ok===true)?`<div class="pill" style="color:var(--green);background:#123021;border-color:#1d4a34">✓ Within range</div>`
               : (ok===false)?`<div class="pill" style="color:var(--red);background:#331716;border-color:#4a1f1d">Not quite — here's the build-up</div>`:``;
  wrap.innerHTML=`
    ${banner}
    <div class="solution">
      <div class="slab">Build-up</div>
      ${c.steps.map(s=>`<div class="step"><span class="desc">${s.d}</span><span class="val mono">${s.v}</span></div>`).join("")}
      <div class="step final"><span class="desc">Answer</span><span class="val mono">${exact}</span></div>
    </div>`;
  wrap.scrollIntoView({behavior:"smooth",block:"end"});
}

/* ============================ boot ============================ */
render();
</script>
</body>
</html>
